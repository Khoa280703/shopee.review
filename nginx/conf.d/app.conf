server {
  listen 80;
  listen [::]:80;
  server_name _;

  # ---- ACME http-01 challenge (Let's Encrypt / Certbot webroot) ----
  # Served before any redirect so cert issuance/renewal works over plain HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # ---- Security headers ----
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  # HSTS is intentionally NOT set here (plain HTTP). It lives in app-tls.conf.

  include /etc/nginx/snippets/app-locations.conf;
}

# -----------------------------------------------------------------------------
# HTTPS: once you have a domain + certificate, enable TLS by replacing this file
# with nginx/conf.d/app-tls.conf (see that file's header for the 3 steps).
# -----------------------------------------------------------------------------
