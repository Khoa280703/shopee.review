user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" cache=$upstream_cache_status';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 12m;

  # ---- Compression (gzip; Brotli needs a custom image, gzip is the fallback) ----
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml application/rss+xml
    image/svg+xml font/woff font/woff2;

  # ---- Rate-limit zones (per client IP) ----
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/m;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
  limit_req_zone $binary_remote_addr zone=ws_limit:10m     rate=100r/s;
  limit_req_status 429;

  # ---- Microcache for hot public GETs ----
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=micro:10m max_size=256m
                   inactive=60s use_temp_path=off;

  # WebSocket upgrade mapping.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Skip microcache for authenticated requests (presence of the auth cookie).
  map $http_cookie $auth_bypass {
    default 0;
    "~*auth_token=" 1;
  }

  # Real request scheme. TLS terminates at Traefik, which forwards over plain
  # HTTP to nginx, so $scheme here is always http. Honor Traefik's forwarded
  # proto (fall back to $scheme for direct/local access) so the app sees the
  # true scheme for Secure cookies, absolute redirects and OAuth callback URLs.
  map $http_x_forwarded_proto $real_proto {
    default $scheme;
    "~.+"   $http_x_forwarded_proto;
  }

  upstream next_upstream {
    server frontend:3000;
    keepalive 32;
  }
  upstream nest_upstream {
    server backend:3066;
    keepalive 32;
  }

  include /etc/nginx/conf.d/*.conf;
}
