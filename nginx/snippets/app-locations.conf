  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ---- WebSocket (Socket.io) ----
  location /socket.io/ {
    limit_req zone=ws_limit burst=100 nodelay;
    proxy_pass http://nest_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
  }

  # ---- Auth endpoints: strict rate limit ----
  location /api/auth/ {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://nest_upstream;
  }

  # ---- Upload endpoint: tighter limit + larger body ----
  location /api/uploads/ {
    limit_req zone=upload_limit burst=2 nodelay;
    client_max_body_size 12m;
    proxy_pass http://nest_upstream;
  }

  # ---- General API with 2s microcache for unauthenticated GETs ----
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_cache micro;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 2s;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_bypass $auth_bypass;
    proxy_no_cache $auth_bypass;
    add_header X-Cache-Status $upstream_cache_status always;

    proxy_pass http://nest_upstream;
  }

  # ---- Bull Board (auth enforced in the app) ----
  location /admin/queues {
    proxy_pass http://nest_upstream;
  }

  # ---- Short-link redirect handled by backend ----
  location /r/ {
    proxy_pass http://nest_upstream;
  }

  # ---- Prometheus metrics ----
  location /metrics {
    proxy_pass http://nest_upstream;
  }

  # ---- Next.js static assets: long cache ----
  location /_next/static/ {
    proxy_pass http://next_upstream;
    proxy_cache micro;
    proxy_cache_valid 200 60m;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ---- Favicon: 204 to silence browser console; actual icon via <link rel="icon"> in HTML ----
  location = /favicon.ico {
    return 204;
    access_log off;
    log_not_found off;
  }

  # ---- Everything else → Next.js frontend ----
  location / {
    proxy_pass http://next_upstream;
  }
