  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $real_proto;

  # Upstreams as variables so proxy_pass re-resolves via the `resolver` (see
  # nginx.conf) on every request — a container recreate no longer strands nginx
  # on a dead IP. $request_uri preserves the exact original path + query string
  # (a variable proxy_pass without it would drop the query args).
  set $backend_host backend:3066;
  set $frontend_host frontend:3000;

  # ---- WebSocket (Socket.io) ----
  location /socket.io/ {
    limit_req zone=ws_limit burst=100 nodelay;
    proxy_pass http://$backend_host$request_uri;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
  }

  # ---- SSE notifications: no buffering, long-lived (longest-prefix match wins,
  #      independent of declaration order). Must re-declare proxy headers since
  #      they don't inherit into a sibling location. ----
  location = /api/notifications/stream {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_proto;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- /auth/me: the auth-context probe fires on every hard load, so it must
  #      NOT sit in the strict auth_limit (5r/m) zone or users get random 429s
  #      that read as spurious logouts. Exact match wins over the /api/auth/
  #      prefix below; use the general api_limit. ----
  location = /api/auth/me {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- Auth endpoints (login/register/forgot/...): strict rate limit ----
  location /api/auth/ {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- Upload endpoint: tighter limit + larger body ----
  location /api/uploads/ {
    limit_req zone=upload_limit burst=2 nodelay;
    client_max_body_size 12m;
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- General API with 2s microcache for unauthenticated GETs ----
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_cache micro;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 2s;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_bypass $auth_bypass;
    proxy_no_cache $auth_bypass;
    add_header X-Cache-Status $upstream_cache_status always;
    # A location with its own add_header does NOT inherit the server-level
    # security headers, so re-assert them here (and in /_next/static/ below).
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    proxy_pass http://$backend_host$request_uri;
  }

  # ---- Bull Board (auth enforced in the app). Rate-limited so the ADMIN_TOKEN
  #      cannot be brute-forced (this router bypasses the Nest throttler). ----
  location /admin/queues {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- Short-link redirect handled by backend ----
  location /r/ {
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- Prometheus metrics: loopback only. Prometheus scrapes backend:3066
  #      directly over the compose network, so this path has no legitimate
  #      external use; the previous 172.16/12 + 10/8 allow-list let anything
  #      arriving via Traefik (which connects from those ranges) scrape it. ----
  location /metrics {
    allow 127.0.0.1;
    deny all;
    proxy_pass http://$backend_host$request_uri;
  }

  # ---- Next.js static assets: long cache ----
  location /_next/static/ {
    proxy_pass http://$frontend_host$request_uri;
    proxy_cache micro;
    proxy_cache_valid 200 60m;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  # ---- Favicon: 204 to silence browser console; actual icon via <link rel="icon"> in HTML ----
  location = /favicon.ico {
    return 204;
    access_log off;
    log_not_found off;
  }

  # ---- Everything else → Next.js frontend ----
  location / {
    proxy_pass http://$frontend_host$request_uri;
  }
