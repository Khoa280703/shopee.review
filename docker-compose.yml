services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopee_review
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopee_review_dev}
      POSTGRES_DB: shopee_review
    # Bound to loopback only: never publish the database on a public interface.
    # Prod overrides POSTGRES_PASSWORD via gitignored .env with a fresh volume.
    ports:
      - "127.0.0.1:65432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopee_review"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Phase 1 — Redis (cache + BullMQ + Socket.io adapter) and pgBouncer pool.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    # Shared by cache-manager (60s-TTL keys, self-expiring), BullMQ, Socket.io
    # adapter and SSE pub/sub. maxmemory-policy MUST be noeviction — BullMQ job
    # state can never be evicted; cache keys expire via TTL, not eviction.
    # (Was 48gb/allkeys-lru, which risked silently dropping queue jobs.)
    command: >-
      redis-server
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Not published to host in prod; reachable on the compose network as redis:6379.

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: shopee_review
      DB_PASSWORD: ${POSTGRES_PASSWORD:-shopee_review_dev}
      DB_NAME: shopee_review
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      # Server-side pool per user/db. Must be >= the app's total client
      # connection_limit so a slow query (MV refresh, retention) doesn't starve
      # concurrent API queries of a pooled connection.
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      MAX_CLIENT_CONN: "100"
      # Transaction mode + Prisma: disable server-side prepared statements.
      MAX_PREPARED_STATEMENTS: "0"
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U shopee_review || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Reachable on the compose network as pgbouncer:6432.

  # ---------------------------------------------------------------------------
  # Automated Postgres backups (daily, gzip, with retention). Dumps land in
  # ./backups on the host. Restore: gunzip -c backups/last/<file>.sql.gz | psql ...
  # ---------------------------------------------------------------------------
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: shopee_review
      POSTGRES_USER: shopee_review
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopee_review_dev}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application services (built from each app's Dockerfile). Behind Nginx.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3066"
      # Runtime traffic through pgBouncer; migrations via DIRECT_URL (Postgres).
      # connection_limit must be >1: this long-running process runs HTTP queries,
      # BullMQ workers and crons in one node — a single connection serializes them
      # all, so one slow query (MV refresh, retention delete) would block every API
      # call. Kept <= pgBouncer DEFAULT_POOL_SIZE (25) so clients never queue for a
      # server connection.
      DATABASE_URL: postgresql://shopee_review:${POSTGRES_PASSWORD:-shopee_review_dev}@pgbouncer:6432/shopee_review?pgbouncer=true&connection_limit=15
      DIRECT_URL: postgresql://shopee_review:${POSTGRES_PASSWORD:-shopee_review_dev}@db:5432/shopee_review
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyChangeMe}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set a long random string in .env)}
      # Guards the Bull Board queue dashboard (job payloads carry emails/reset
      # links) — required, no insecure default, same policy as JWT_SECRET.
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required (set a long random string in .env)}
      # Optional hard override. Normally leave unset: the backend auto-enables the
      # Secure cookie flag when the request arrives over HTTPS (X-Forwarded-Proto).
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-shopee.review <onboarding@resend.dev>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL:-}
      # Optional: platform affiliate id (scrape degrades to plain product URL if unset).
      SHOPEE_AFFILIATE_ID: ${SHOPEE_AFFILIATE_ID:-}
      # First-admin bootstrap: comma-separated usernames granted is_admin on boot.
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-shopee-review-uploads}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    expose:
      - "3066"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3066/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      # No NEXT_PUBLIC_API_URL: the browser uses a relative /api base (nginx is
      # same-origin), so nothing host-specific is baked into the client bundle.
      args:
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set a long random string in .env)}
      # Internal URL for SSR → backend (never exposed to browser)
      API_INTERNAL_URL: http://backend:3066/api
    depends_on:
      - backend
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Phase 7 — Nginx single entrypoint (rate limit, WS proxy, gzip, headers).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Loopback-only publish: in prod Traefik reaches nginx over the `coolify`
    # network (TLS terminates there), so the app is never served as plain HTTP on
    # a public interface. Local dev still hits http://localhost:8081.
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - nginx-cache:/var/cache/nginx
      - ./nginx/certbot/www:/var/www/certbot:ro
    networks:
      - default
      - coolify
    labels:
      traefik.enable: "true"
      traefik.docker.network: "coolify"
      # HTTP → redirect to HTTPS (Traefik handles TLS via Let's Encrypt)
      traefik.http.routers.shopeereview-http.entryPoints: "http"
      traefik.http.routers.shopeereview-http.rule: "Host(`${DOMAIN:-localhost}`)"
      traefik.http.routers.shopeereview-http.middlewares: "redirect-to-https"
      traefik.http.routers.shopeereview-https.entryPoints: "https"
      traefik.http.routers.shopeereview-https.rule: "Host(`${DOMAIN:-localhost}`)"
      traefik.http.routers.shopeereview-https.tls: "true"
      traefik.http.routers.shopeereview-https.tls.certresolver: "letsencrypt"
      traefik.http.services.shopeereview.loadbalancer.server.port: "80"
    depends_on:
      - frontend
      - backend

  # Certbot issues/renews Let's Encrypt certs via the ACME http-01 webroot.
  # First issuance is manual (see nginx/conf.d/app-tls.conf.disabled); after
  # that this container renews every 12h and exits-retry on failure.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  # ---------------------------------------------------------------------------
  # Phase 6 — Meilisearch (primary search; PG FTS is the fallback).
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyChangeMe}
      MEILI_MAX_INDEXING_MEMORY: 512Mb
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Reachable on the compose network as meilisearch:7700.

volumes:
  pgdata:
  redis-data:
  meili-data:
  nginx-cache:

networks:
  default:
  coolify:
    external: true
